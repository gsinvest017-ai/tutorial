name: semgrep

# 純掃描、不擋 build：semgrep OSS 規則做輕量 SAST（注入、危險函式、硬編密鑰等）。
# - 用 pip 裝 semgrep CLI + 公開 ruleset（p/security-audit、p/secrets），免登入、免 token、免費。
# - report-only：findings 不讓 job 失敗，永遠上傳 SARIF artifact。
# - 公開 repo best-effort 推上 Code Scanning UI（私有需 GHAS，失敗不報錯）。
# 不影響任何既有 CI / merge wiring。

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install semgrep
        run: pip install semgrep

      - name: Scan
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --error || true

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

      - name: Best-effort publish to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
