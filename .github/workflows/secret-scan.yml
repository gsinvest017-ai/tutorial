name: secret-scan

# 純掃描、不擋 build：gitleaks 找誤 commit 的金鑰/token。
# - 用 gitleaks 官方 release binary（避開 gitleaks-action 對 org 帳號的 license gate）
# - report-only：偵測到也不讓 job 失敗（|| true），永遠上傳 SARIF artifact 供人檢視
# - 公開 repo 額外嘗試把 SARIF 推上 Code Scanning UI（私有需 GHAS，故 best-effort 不報錯）
# 不影響任何既有 CI / merge wiring。

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 1"   # 每週一 03:00 (UTC+8) 全庫掃一次

permissions:
  contents: read
  security-events: write   # 用於 best-effort SARIF 上傳；無 GHAS 時上傳步驟自行跳過

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # 掃完整 git 歷史

      - name: Install gitleaks
        run: |
          VER="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            --exit-code 0 \
            --verbose || true

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

      - name: Best-effort publish to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
